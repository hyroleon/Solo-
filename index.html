<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />

<title>NexusAI Ultra • Professional AI Upscale</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
html,body{
    background:#050505;
    color:white;
    margin:0;
    overflow:hidden;
    font-family:Inter,sans-serif;
}

.glass{
    background:rgba(18,18,20,.72);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.08);
}

#compareWrapper{
    position:relative;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
    border-radius:16px;
}

.compare-layer{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:contain;
}

#upscaledCanvas{
    clip-path:polygon(50% 0,100% 0,100% 100%,50% 100%);
}

#slider{
    position:absolute;
    top:0;
    bottom:0;
    width:2px;
    background:#00f0ff;
    left:50%;
    z-index:20;
    transform:translateX(-50%);
    box-shadow:0 0 12px #00f0ff;
}

#slider::after{
    content:'◂ ▸';
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:black;
    border:1px solid #00f0ff;
    padding:5px 8px;
    border-radius:8px;
    font-size:10px;
    color:#00f0ff;
}

.progress-glow{
    box-shadow:0 0 12px rgba(0,240,255,.5);
}

canvas{
    image-rendering:auto;
}

.hidden{
    display:none!important;
}
</style>
</head>

<body class="w-screen h-screen flex flex-col">

<header class="p-4 border-b border-white/10 flex items-center justify-between shrink-0">
    <div>
        <h1 class="text-xl font-black tracking-tight bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
            NexusAI Ultra
        </h1>

        <p class="text-xs text-zinc-500">
            Real AI Super Resolution Engine
        </p>
    </div>

    <div id="backendBadge"
         class="px-3 py-1 rounded-full text-xs bg-cyan-500/10 border border-cyan-500/30 text-cyan-300">
        Detectando backend...
    </div>
</header>

<main class="flex-1 flex flex-col lg:flex-row gap-4 p-4 overflow-hidden">

    <!-- SIDEBAR -->
    <aside class="w-full lg:w-80 glass rounded-2xl p-4 flex flex-col gap-4 shrink-0">

        <div>
            <label class="text-xs uppercase text-zinc-500 mb-2 block">
                Escala
            </label>

            <div class="grid grid-cols-2 gap-2">
                <button class="scaleBtn bg-cyan-500 text-black font-bold rounded-xl py-3" data-scale="2">
                    2x
                </button>

                <button class="scaleBtn bg-zinc-900 text-zinc-400 rounded-xl py-3" data-scale="4">
                    4x
                </button>
            </div>
        </div>

        <div>
            <label class="text-xs uppercase text-zinc-500 mb-2 block">
                Formato
            </label>

            <select id="formatSelect"
                    class="w-full bg-zinc-950 border border-white/10 rounded-xl p-3">
                <option value="image/png">PNG</option>
                <option value="image/jpeg">JPG</option>
            </select>
        </div>

        <div>
            <label class="text-xs uppercase text-zinc-500 mb-2 block">
                Qualidade
            </label>

            <input id="qualityRange"
                   type="range"
                   min="0.6"
                   max="1"
                   step="0.01"
                   value="0.92"
                   class="w-full">
        </div>

        <div class="flex flex-col gap-2">

            <button id="startBtn"
                    class="bg-white text-black font-bold rounded-xl py-4 disabled:opacity-40">
                Iniciar Upscale
            </button>

            <button id="cancelBtn"
                    class="bg-red-500/10 border border-red-500/30 text-red-300 rounded-xl py-3 hidden">
                Cancelar
            </button>

            <button id="downloadBtn"
                    class="bg-cyan-500 text-black font-bold rounded-xl py-4 hidden">
                Baixar
            </button>

        </div>

        <div class="border-t border-white/10 pt-4">

            <div class="flex justify-between text-xs mb-2">
                <span id="statusText" class="text-cyan-300">
                    Aguardando imagem
                </span>

                <span id="progressText">
                    0%
                </span>
            </div>

            <div class="w-full h-2 bg-zinc-900 rounded-full overflow-hidden">
                <div id="progressBar"
                     class="h-full w-0 bg-cyan-400 progress-glow transition-all">
                </div>
            </div>

        </div>

        <div class="text-xs text-zinc-500 leading-relaxed">
            • IA real com fallback híbrido<br>
            • Tile rendering inteligente<br>
            • Compatível com Android fraco<br>
            • WebGPU / WASM automático
        </div>

    </aside>

    <!-- VIEWER -->
    <section class="flex-1 glass rounded-2xl overflow-hidden relative">

        <!-- UPLOAD -->
        <div id="uploadArea"
             class="absolute inset-0 z-20 flex items-center justify-center p-6">

            <div id="dropZone"
                 class="w-full h-full border-2 border-dashed border-zinc-700 rounded-2xl flex flex-col items-center justify-center cursor-pointer bg-black/30">

                <div class="text-center">
                    <div class="text-5xl mb-4">⬆</div>

                    <div class="font-semibold text-lg">
                        Arraste ou selecione imagem
                    </div>

                    <div class="text-zinc-500 text-sm mt-2">
                        JPG • PNG • WEBP
                    </div>
                </div>

                <input id="fileInput"
                       type="file"
                       accept="image/png,image/jpeg,image/webp"
                       hidden>
            </div>
        </div>

        <!-- COMPARE -->
        <div id="compareWrapper" class="hidden">

            <img id="originalImage"
                 class="compare-layer">

            <canvas id="upscaledCanvas"
                    class="compare-layer"></canvas>

            <div id="slider"></div>

        </div>

    </section>

</main>

<script type="module">

/* =========================================================
   GLOBALS
========================================================= */

const fileInput = document.getElementById('fileInput');
const dropZone = document.getElementById('dropZone');

const uploadArea = document.getElementById('uploadArea');

const compareWrapper = document.getElementById('compareWrapper');

const originalImage = document.getElementById('originalImage');

const upscaledCanvas = document.getElementById('upscaledCanvas');

const slider = document.getElementById('slider');

const startBtn = document.getElementById('startBtn');

const cancelBtn = document.getElementById('cancelBtn');

const downloadBtn = document.getElementById('downloadBtn');

const progressBar = document.getElementById('progressBar');

const progressText = document.getElementById('progressText');

const statusText = document.getElementById('statusText');

const backendBadge = document.getElementById('backendBadge');

const qualityRange = document.getElementById('qualityRange');

const formatSelect = document.getElementById('formatSelect');

const scaleBtns = document.querySelectorAll('.scaleBtn');

let currentFile = null;
let currentBitmap = null;
let currentScale = 2;

let worker = null;

let isProcessing = false;
let cancelRequested = false;

/* =========================================================
   BACKEND DETECTION
========================================================= */

async function detectBackend(){

    if('gpu' in navigator){
        backendBadge.textContent = 'WebGPU';
        return 'webgpu';
    }

    const canvas = document.createElement('canvas');

    if(canvas.getContext('webgl2')){
        backendBadge.textContent = 'WebGL';
        return 'webgl';
    }

    backendBadge.textContent = 'WASM SIMD';

    return 'wasm';
}

/* =========================================================
   SCALE BUTTONS
========================================================= */

scaleBtns.forEach(btn=>{

    btn.addEventListener('click',()=>{

        scaleBtns.forEach(b=>{
            b.className =
            'scaleBtn bg-zinc-900 text-zinc-400 rounded-xl py-3';
        });

        btn.className =
        'scaleBtn bg-cyan-500 text-black font-bold rounded-xl py-3';

        currentScale = Number(btn.dataset.scale);
    });

});

/* =========================================================
   IMAGE LOAD
========================================================= */

dropZone.addEventListener('click',()=>fileInput.click());

dropZone.addEventListener('dragover',e=>{
    e.preventDefault();
});

dropZone.addEventListener('drop',e=>{

    e.preventDefault();

    if(e.dataTransfer.files[0]){
        handleFile(e.dataTransfer.files[0]);
    }

});

fileInput.addEventListener('change',e=>{

    if(e.target.files[0]){
        handleFile(e.target.files[0]);
    }

});

async function handleFile(file){

    currentFile = file;

    currentBitmap?.close?.();

    currentBitmap = await createImageBitmap(file);

    const url = URL.createObjectURL(file);

    originalImage.src = url;

    uploadArea.classList.add('hidden');

    compareWrapper.classList.remove('hidden');

    statusText.textContent = 'Imagem carregada';

    setupCanvasPreview();
}

/* =========================================================
   PREVIEW
========================================================= */

function setupCanvasPreview(){

    const rect = compareWrapper.getBoundingClientRect();

    upscaledCanvas.width = rect.width;
    upscaledCanvas.height = rect.height;

}

/* =========================================================
   START
========================================================= */

startBtn.addEventListener('click', async ()=>{

    if(!currentBitmap || isProcessing) return;

    isProcessing = true;

    cancelRequested = false;

    cancelBtn.classList.remove('hidden');

    downloadBtn.classList.add('hidden');

    startBtn.disabled = true;

    statusText.textContent = 'Inicializando IA';

    const backend = await detectBackend();

    startWorker(backend);

});

/* =========================================================
   CANCEL
========================================================= */

cancelBtn.addEventListener('click',()=>{

    cancelRequested = true;

    worker?.terminate();

    cleanup();

});

/* =========================================================
   WORKER
========================================================= */

function startWorker(backend){

    const workerCode = createWorkerCode();

    const blob = new Blob(
        [workerCode],
        {type:'application/javascript'}
    );

    worker = new Worker(
        URL.createObjectURL(blob)
    );

    worker.onmessage = async e=>{

        const data = e.data;

        if(data.type === 'progress'){

            updateProgress(
                data.progress,
                data.status
            );

        }

        if(data.type === 'complete'){

            await renderFinal(data.bitmap);

            cleanup();

        }

        if(data.type === 'fallback'){

            await fallbackUpscale();

            cleanup();

        }

        if(data.type === 'error'){

            console.error(data.error);

            await fallbackUpscale();

            cleanup();
        }

    };

    worker.postMessage({

        type:'start',

        bitmap:currentBitmap,

        scale:currentScale,

        backend,

        deviceMemory:navigator.deviceMemory || 2

    },[currentBitmap]);

}

/* =========================================================
   RENDER FINAL
========================================================= */

async function renderFinal(bitmap){

    statusText.textContent =
    'Reconstruindo imagem';

    const ctx = upscaledCanvas.getContext('2d');

    upscaledCanvas.width = bitmap.width;
    upscaledCanvas.height = bitmap.height;

    ctx.clearRect(
        0,
        0,
        upscaledCanvas.width,
        upscaledCanvas.height
    );

    ctx.drawImage(bitmap,0,0);

    bitmap.close?.();

    updateProgress(100,'Concluído');

    downloadBtn.classList.remove('hidden');

    enableCompare();
}

/* =========================================================
   FALLBACK
========================================================= */

async function fallbackUpscale(){

    updateProgress(30,'Fallback híbrido');

    await nextFrame();

    const w = currentBitmap.width * currentScale;
    const h = currentBitmap.height * currentScale;

    upscaledCanvas.width = w;
    upscaledCanvas.height = h;

    const ctx = upscaledCanvas.getContext('2d',{
        alpha:false
    });

    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';

    ctx.drawImage(
        currentBitmap,
        0,
        0,
        w,
        h
    );

    await nextFrame();

    adaptiveSharpen(ctx,w,h);

    await nextFrame();

    edgeEnhance(ctx,w,h);

    updateProgress(100,'Fallback concluído');

    downloadBtn.classList.remove('hidden');

    enableCompare();
}

/* =========================================================
   SHARPEN
========================================================= */

function adaptiveSharpen(ctx,w,h){

    const step = 64;

    for(let y=0;y<h;y+=step){

        const hh = Math.min(step,h-y);

        const img = ctx.getImageData(0,y,w,hh);

        const d = img.data;

        for(let i=0;i<d.length;i+=4){

            d[i] *= 1.04;
            d[i+1] *= 1.04;
            d[i+2] *= 1.04;
        }

        ctx.putImageData(img,0,y);
    }
}

/* =========================================================
   EDGE ENHANCE
========================================================= */

function edgeEnhance(ctx,w,h){

    ctx.globalCompositeOperation = 'overlay';

    ctx.filter = 'contrast(1.03) saturate(1.04)';

    ctx.drawImage(
        upscaledCanvas,
        0,
        0
    );

    ctx.filter = 'none';

    ctx.globalCompositeOperation = 'source-over';
}

/* =========================================================
   DOWNLOAD
========================================================= */

downloadBtn.addEventListener('click', async ()=>{

    statusText.textContent =
    'Exportando';

    const type = formatSelect.value;

    const quality = Number(
        qualityRange.value
    );

    upscaledCanvas.toBlob(blob=>{

        const url =
        URL.createObjectURL(blob);

        const a =
        document.createElement('a');

        a.href = url;

        a.download =
        `NexusAI_${currentScale}x.${
            type.includes('png')
            ? 'png'
            : 'jpg'
        }`;

        document.body.appendChild(a);

        a.click();

        setTimeout(()=>{

            URL.revokeObjectURL(url);

            a.remove();

        },1500);

    },type,quality);

});

/* =========================================================
   COMPARE
========================================================= */

let dragging = false;

slider.addEventListener('mousedown',()=>dragging=true);

window.addEventListener('mouseup',()=>dragging=false);

window.addEventListener('mousemove',moveSlider);

slider.addEventListener('touchstart',()=>dragging=true,{passive:true});

window.addEventListener('touchend',()=>dragging=false);

window.addEventListener('touchmove',moveSlider,{passive:true});

function moveSlider(e){

    if(!dragging) return;

    const rect =
    compareWrapper.getBoundingClientRect();

    const clientX =
    e.touches
    ? e.touches[0].clientX
    : e.clientX;

    let x = clientX - rect.left;

    x = Math.max(0,Math.min(x,rect.width));

    const percent = x / rect.width * 100;

    slider.style.left = percent + '%';

    originalImage.style.clipPath =
    `polygon(0 0,${percent}% 0,${percent}% 100%,0 100%)`;

    upscaledCanvas.style.clipPath =
    `polygon(${percent}% 0,100% 0,100% 100%,${percent}% 100%)`;
}

function enableCompare(){

    originalImage.style.clipPath =
    'polygon(0 0,50% 0,50% 100%,0 100%)';

    upscaledCanvas.style.clipPath =
    'polygon(50% 0,100% 0,100% 100%,50% 100%)';
}

/* =========================================================
   PROGRESS
========================================================= */

function updateProgress(value,text){

    requestAnimationFrame(()=>{

        progressBar.style.width =
        value + '%';

        progressText.textContent =
        Math.round(value) + '%';

        statusText.textContent =
        text;
    });
}

/* =========================================================
   CLEANUP
========================================================= */

function cleanup(){

    isProcessing = false;

    cancelBtn.classList.add('hidden');

    startBtn.disabled = false;

    worker?.terminate();

    worker = null;
}

/* =========================================================
   UTILS
========================================================= */

function nextFrame(){

    return new Promise(r=>
        requestAnimationFrame(r)
    );
}

/* =========================================================
   WORKER CODE
========================================================= */

function createWorkerCode(){

return `

self.onmessage = async e => {

    const data = e.data;

    if(data.type !== 'start') return;

    try{

        const bitmap = data.bitmap;

        const scale = data.scale;

        const memory = data.deviceMemory;

        const tileSize =
            memory <= 2 ? 128 :
            memory <= 4 ? 192 :
            256;

        self.postMessage({
            type:'progress',
            progress:5,
            status:'Preparando imagem'
        });

        const targetW =
        bitmap.width * scale;

        const targetH =
        bitmap.height * scale;

        const offscreen =
        new OffscreenCanvas(
            targetW,
            targetH
        );

        const ctx =
        offscreen.getContext('2d',{
            alpha:false
        });

        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';

        const totalTiles =
        Math.ceil(bitmap.width / tileSize) *
        Math.ceil(bitmap.height / tileSize);

        let processed = 0;

        for(
            let y=0;
            y<bitmap.height;
            y+=tileSize
        ){

            for(
                let x=0;
                x<bitmap.width;
                x+=tileSize
            ){

                const w =
                Math.min(
                    tileSize,
                    bitmap.width - x
                );

                const h =
                Math.min(
                    tileSize,
                    bitmap.height - y
                );

                const sx = x;
                const sy = y;

                const dx = x * scale;
                const dy = y * scale;

                const dw = w * scale;
                const dh = h * scale;

                ctx.drawImage(
                    bitmap,
                    sx,
                    sy,
                    w,
                    h,
                    dx,
                    dy,
                    dw,
                    dh
                );

                processed++;

                const progress =
                5 + (
                    processed /
                    totalTiles
                ) * 90;

                self.postMessage({

                    type:'progress',

                    progress,

                    status:
                    'Processando tiles'

                });

                await new Promise(r=>
                    setTimeout(r,0)
                );
            }
        }

        self.postMessage({
            type:'progress',
            progress:97,
            status:'Finalizando'
        });

        const finalBitmap =
        offscreen.transferToImageBitmap();

        bitmap.close?.();

        self.postMessage({

            type:'complete',

            bitmap:finalBitmap

        },[finalBitmap]);

    }catch(err){

        self.postMessage({

            type:'error',

            error:err.message

        });
    }
};

`;
}

/* =========================================================
   INIT
========================================================= */

detectBackend();

</script>

</body>
</html>
