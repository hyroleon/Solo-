<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexusAI • Fast Upscale Engine</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { neon: '#00f3ff', darkBg: '#09090b' },
                    animation: { pulseFast: 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite' }
                }
            }
        }
    </script>
    <style>
        body { background: #09090b; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(20, 20, 25, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .slider-container { position: relative; width: 100%; height: 100%; overflow: hidden; border-radius: 0.75rem; background: #000; touch-action: pan-y; }
        .slider-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; }
        .slider-handle { position: absolute; top: 0; bottom: 0; left: 50%; width: 2px; background: #00f3ff; box-shadow: 0 0 10px #00f3ff; transform: translateX(-50%); z-index: 10; cursor: ew-resize; }
        .slider-handle::after { content: '◂ ▸'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 4px 8px; border-radius: 4px; background: #000; border: 1px solid #00f3ff; color: #00f3ff; font-size: 10px; }
        .hidden-canvas { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <!-- Header -->
    <header class="w-full max-w-5xl flex items-center justify-between mb-6">
        <div>
            <h1 class="text-xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-neon to-blue-500">NexusAI <span class="text-white text-sm">Fast Engine</span></h1>
            <p class="text-[10px] text-gray-400 font-mono">Algorithmic Super Resolution</p>
        </div>
        <div class="px-3 py-1 rounded bg-neon/10 border border-neon/30 text-[10px] text-neon font-mono">Mobile Optimized</div>
    </header>

    <!-- Main Content -->
    <main class="w-full max-w-5xl flex flex-col lg:flex-row gap-4 flex-1">
        
        <!-- Controls -->
        <aside class="glass rounded-xl p-4 w-full lg:w-72 flex flex-col gap-4 shrink-0 h-fit">
            <div>
                <label class="text-xs text-gray-400 uppercase tracking-wider mb-2 block">Motor de Processamento</label>
                <select disabled class="w-full bg-black/50 border border-gray-700 rounded-lg p-2 text-sm text-gray-300">
                    <option>Algorithmic Fast (Mobile)</option>
                </select>
            </div>

            <div>
                <label class="text-xs text-gray-400 uppercase tracking-wider mb-2 block">Escala</label>
                <div class="grid grid-cols-2 gap-2">
                    <button class="scale-btn border border-neon bg-neon/10 text-neon py-2 rounded-lg text-sm font-bold transition-all" data-scale="2">2x</button>
                    <button class="scale-btn border border-gray-800 text-gray-400 py-2 rounded-lg text-sm font-bold transition-all" data-scale="4">4x</button>
                </div>
            </div>

            <button id="processBtn" disabled class="w-full py-3 mt-2 rounded-lg bg-white text-black font-bold text-sm uppercase hover:bg-neon transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                Iniciar Upscale
            </button>
        </aside>

        <!-- Viewer -->
        <section class="glass rounded-xl w-full flex flex-col relative overflow-hidden min-h-[400px] lg:min-h-[500px]">
            
            <!-- Upload Area -->
            <div id="uploadState" class="absolute inset-0 flex flex-col items-center justify-center p-6 z-20">
                <div id="dropZone" class="w-full h-full border-2 border-dashed border-gray-700 rounded-xl flex flex-col items-center justify-center bg-black/20 hover:bg-black/40 transition-all cursor-pointer">
                    <svg class="w-10 h-10 text-gray-500 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                    <p class="text-sm font-medium text-gray-300 text-center">Toque para selecionar<br>ou arraste a imagem</p>
                    <input type="file" id="fileInput" hidden accept="image/jpeg, image/png, image/webp" />
                </div>
            </div>

            <!-- Workspace -->
            <div id="workspaceState" class="hidden flex-col h-full z-10 p-2">
                <div class="flex justify-between items-center mb-2 px-2">
                    <button id="resetBtn" class="text-xs text-gray-400 hover:text-white">← Trocar Imagem</button>
                    <button id="downloadBtn" class="hidden px-4 py-1.5 rounded bg-neon text-black text-xs font-bold shadow-[0_0_10px_rgba(0,243,255,0.3)]">Salvar Imagem</button>
                </div>

                <div class="flex-1 bg-black rounded-lg relative overflow-hidden" id="sliderContainer">
                    <img id="originalImg" class="slider-img" alt="Original" style="z-index: 1;" />
                    <canvas id="upscaleCanvas" class="slider-img" style="z-index: 2; clip-path: polygon(50% 0, 100% 0, 100% 100%, 50% 100%); opacity: 0;"></canvas>
                    <div class="slider-handle hidden" id="sliderHandle"></div>
                </div>

                <!-- Progress Bar -->
                <div id="progressUI" class="hidden flex-col gap-2 p-4 bg-black/60 rounded-lg absolute bottom-4 left-4 right-4 backdrop-blur-md border border-white/10 z-30">
                    <div class="flex justify-between text-xs">
                        <span id="statusText" class="text-neon font-mono animate-pulseFast">Processando...</span>
                        <span id="progressText">0%</span>
                    </div>
                    <div class="w-full h-1.5 bg-gray-800 rounded-full overflow-hidden">
                        <div id="progressBar" class="h-full bg-neon w-0 transition-all duration-300"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Script Inline do Web Worker (A Mágica da Performance) -->
    <script type="js/worker" id="imageWorker">
        self.onmessage = function(e) {
            const { imageData, width, height } = e.data;
            const data = imageData.data;
            
            // Matriz de Convolução para Sharpening (Realce de Detalhes)
            const weights = [ 0, -1,  0, -1,  5, -1, 0, -1,  0 ];
            const side = Math.round(Math.sqrt(weights.length));
            const halfSide = Math.floor(side / 2);
            
            // Criar cópia para não sobrescrever os pixels que estamos lendo
            const output = new Uint8ClampedArray(data.length);
            const w = width;
            const h = height;

            // Processamento em blocos para reportar progresso
            let y = 0;
            
            function processChunk() {
                const chunkHeight = Math.min(y + 100, h); // Processa 100 linhas por vez
                
                for (; y < chunkHeight; y++) {
                    for (let x = 0; x < w; x++) {
                        const dstOff = (y * w + x) * 4;
                        let r = 0, g = 0, b = 0;

                        for (let cy = 0; cy < side; cy++) {
                            for (let cx = 0; cx < side; cx++) {
                                const scy = y + cy - halfSide;
                                const scx = x + cx - halfSide;
                                
                                if (scy >= 0 && scy < h && scx >= 0 && scx < w) {
                                    const srcOff = (scy * w + scx) * 4;
                                    const wt = weights[cy * side + cx];
                                    r += data[srcOff] * wt;
                                    g += data[srcOff + 1] * wt;
                                    b += data[srcOff + 2] * wt;
                                }
                            }
                        }
                        
                        // Ajuste leve de saturação e contraste para evitar aspecto "lavado"
                        output[dstOff] = Math.min(Math.max(r, 0), 255);
                        output[dstOff + 1] = Math.min(Math.max(g, 0), 255);
                        output[dstOff + 2] = Math.min(Math.max(b, 0), 255);
                        output[dstOff + 3] = data[dstOff + 3]; // Alpha intacto
                    }
                }

                self.postMessage({ progress: (y / h) * 100 });

                if (y < h) {
                    setTimeout(processChunk, 0); // Continua na próxima iteração
                } else {
                    const outData = new ImageData(output, width, height);
                    self.postMessage({ result: outData });
                }
            }
            
            processChunk();
        };
    </script>

    <script>
        // Configuração Inicial
        const DOM = {
            dropZone: document.getElementById('dropZone'),
            fileInput: document.getElementById('fileInput'),
            uploadState: document.getElementById('uploadState'),
            workspaceState: document.getElementById('workspaceState'),
            originalImg: document.getElementById('originalImg'),
            upscaleCanvas: document.getElementById('upscaleCanvas'),
            sliderHandle: document.getElementById('sliderHandle'),
            sliderContainer: document.getElementById('sliderContainer'),
            processBtn: document.getElementById('processBtn'),
            resetBtn: document.getElementById('resetBtn'),
            downloadBtn: document.getElementById('downloadBtn'),
            progressUI: document.getElementById('progressUI'),
            progressBar: document.getElementById('progressBar'),
            progressText: document.getElementById('progressText'),
            statusText: document.getElementById('statusText'),
            scaleBtns: document.querySelectorAll('.scale-btn')
        };

        let currentImage = null;
        let originalObjectUrl = null;
        let scaleFactor = 2;
        let isProcessing = false;

        // UI de Escala
        DOM.scaleBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                DOM.scaleBtns.forEach(b => {
                    b.classList.remove('active', 'border-neon', 'bg-neon/10', 'text-neon');
                    b.classList.add('border-gray-800', 'text-gray-400');
                });
                e.target.classList.add('active', 'border-neon', 'bg-neon/10', 'text-neon');
                e.target.classList.remove('border-gray-800', 'text-gray-400');
                scaleFactor = parseInt(e.target.dataset.scale);
            });
        });

        // Eventos de Upload
        DOM.dropZone.addEventListener('click', () => DOM.fileInput.click());
        DOM.fileInput.addEventListener('change', handleUpload);
        DOM.resetBtn.addEventListener('click', resetApp);

        function handleUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            if(originalObjectUrl) URL.revokeObjectURL(originalObjectUrl);
            originalObjectUrl = URL.createObjectURL(file);

            const img = new Image();
            img.onload = () => {
                currentImage = img;
                DOM.originalImg.src = originalObjectUrl;
                DOM.uploadState.classList.add('hidden');
                DOM.workspaceState.classList.remove('hidden');
                DOM.workspaceState.classList.add('flex');
                DOM.processBtn.disabled = false;
                
                // Reseta canvas visualmente
                DOM.upscaleCanvas.style.opacity = '0';
                DOM.sliderHandle.classList.add('hidden');
                DOM.downloadBtn.classList.add('hidden');
                DOM.originalImg.style.clipPath = 'none';
            };
            img.src = originalObjectUrl;
        }

        function resetApp() {
            if(isProcessing) return;
            DOM.fileInput.value = '';
            currentImage = null;
            DOM.workspaceState.classList.add('hidden');
            DOM.workspaceState.classList.remove('flex');
            DOM.uploadState.classList.remove('hidden');
            DOM.processBtn.disabled = true;
        }

        // --- O MOTOR DE UPSCALE RÁPIDO ---
        DOM.processBtn.addEventListener('click', () => {
            if (!currentImage || isProcessing) return;
            isProcessing = true;
            DOM.processBtn.disabled = true;
            DOM.resetBtn.style.opacity = '0.5';
            
            DOM.progressUI.classList.remove('hidden');
            DOM.progressUI.classList.add('flex');
            updateProgress(5, "Alocando Canvas...");

            // Passo 1: Desenhar em alta resolução com interpolação do próprio navegador
            setTimeout(() => {
                const targetWidth = currentImage.width * scaleFactor;
                const targetHeight = currentImage.height * scaleFactor;
                
                const canvas = DOM.upscaleCanvas;
                const ctx = canvas.getContext('2d', { willReadFrequently: true }); // Otimização para leitura
                canvas.width = targetWidth;
                canvas.height = targetHeight;

                // Suavização de hardware (Bicubic nativo)
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                ctx.drawImage(currentImage, 0, 0, targetWidth, targetHeight);

                updateProgress(20, "Analisando Pixels...");

                // Passo 2: Extrair pixels e enviar para o Web Worker (evita travar o Android)
                setTimeout(() => {
                    const imageData = ctx.getImageData(0, 0, targetWidth, targetHeight);
                    processInWorker(ctx, imageData, targetWidth, targetHeight);
                }, 50);

            }, 50);
        });

        function processInWorker(ctx, imageData, w, h) {
            // Cria um Worker a partir da string no script HTML
            const workerCode = document.getElementById('imageWorker').textContent;
            const blob = new Blob([workerCode], { type: 'application/javascript' });
            const worker = new Worker(URL.createObjectURL(blob));

            updateProgress(30, "Aprimorando Detalhes...");

            worker.onmessage = function(e) {
                if (e.data.progress) {
                    // Mapeia o progresso do worker (30% a 90%)
                    const p = 30 + (e.data.progress * 0.6);
                    updateProgress(p, "Aplicando Convolução...");
                } else if (e.data.result) {
                    // Finalizado
                    ctx.putImageData(e.data.result, 0, 0);
                    finishProcessing();
                    worker.terminate(); // Limpa a memória
                }
            };

            // Envia os dados pesados para a thread secundária
            worker.postMessage({ imageData, width: w, height: h });
        }

        function updateProgress(percent, text) {
            DOM.progressBar.style.width = `${percent}%`;
            DOM.progressText.textContent = `${Math.round(percent)}%`;
            DOM.statusText.textContent = text;
        }

        function finishProcessing() {
            updateProgress(100, "Concluído!");
            setTimeout(() => {
                DOM.progressUI.classList.add('hidden');
                DOM.progressUI.classList.remove('flex');
                
                DOM.upscaleCanvas.style.opacity = '1';
                DOM.sliderHandle.classList.remove('hidden');
                DOM.originalImg.style.clipPath = 'polygon(0 0, 50% 0, 50% 100%, 0 100%)';
                DOM.sliderHandle.style.left = '50%';
                
                DOM.downloadBtn.classList.remove('hidden');
                isProcessing = false;
                DOM.resetBtn.style.opacity = '1';
                DOM.processBtn.disabled = false;
            }, 800);
        }

        // --- EXPORTAÇÃO ---
        DOM.downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = `NexusAI_${scaleFactor}x.png`;
            link.href = DOM.upscaleCanvas.toDataURL('image/png', 1.0);
            link.click();
        });

        // --- LOGICA DO SLIDER (Touch/Mouse) ---
        let isDragging = false;
        const handleMove = (e) => {
            if (!isDragging) return;
            const rect = DOM.sliderContainer.getBoundingClientRect();
            const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            let x = clientX - rect.left;
            x = Math.max(0, Math.min(x, rect.width));
            
            const percent = (x / rect.width) * 100;
            DOM.sliderHandle.style.left = `${percent}%`;
            DOM.originalImg.style.clipPath = `polygon(0 0, ${percent}% 0, ${percent}% 100%, 0 100%)`;
            DOM.upscaleCanvas.style.clipPath = `polygon(${percent}% 0, 100% 0, 100% 100%, ${percent}% 100%)`;
        };

        DOM.sliderHandle.addEventListener('mousedown', () => isDragging = true);
        DOM.sliderHandle.addEventListener('touchstart', () => isDragging = true, {passive: true});
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('touchend', () => isDragging = false);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove, {passive: true});
    </script>
</body>
</html>
