<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ultra Image AI | 4X + Vetorizador</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/potrace/1.1.3/potrace.min.js"></script>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}body{ background:#050816; color:white; overflow-x:hidden; min-height:100vh; }

body::before{ content:""; position:fixed; inset:0; background: radial-gradient(circle at top left,#1d4ed855,transparent 30%), radial-gradient(circle at bottom right,#9333ea55,transparent 30%); pointer-events:none; }

.container{ max-width:1200px; margin:auto; padding:30px; }

.header{ text-align:center; margin-bottom:35px; }

.header h1{ font-size:3rem; font-weight:800; background:linear-gradient(90deg,#60a5fa,#a855f7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:10px; }

.header p{ color:#9ca3af; font-size:1.05rem; }

.card{ background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); backdrop-filter:blur(14px); border-radius:24px; padding:25px; box-shadow:0 10px 40px rgba(0,0,0,0.4); }

.upload-area{ border:2px dashed #3b82f6; border-radius:22px; padding:50px 20px; text-align:center; transition:.3s; cursor:pointer; margin-bottom:25px; }

.upload-area:hover{ background:rgba(59,130,246,0.08); transform:scale(1.01); }

.upload-area h2{ margin-bottom:10px; font-size:1.4rem; }

.upload-area p{ color:#9ca3af; }

input[type=file]{ display:none; }

.controls{ display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:18px; margin-bottom:25px; }

.control-box{ background:rgba(255,255,255,0.04); padding:18px; border-radius:18px; border:1px solid rgba(255,255,255,0.06); }

.control-box label{ display:block; margin-bottom:10px; font-weight:600; }

select, button{ width:100%; padding:14px; border:none; border-radius:14px; font-size:1rem; font-weight:700; }

select{ background:#111827; color:white; outline:none; }

button{ background:linear-gradient(90deg,#2563eb,#9333ea); color:white; cursor:pointer; transition:.25s; }

button:hover{ transform:translateY(-2px); box-shadow:0 10px 25px rgba(59,130,246,0.35); }

.preview-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:22px; margin-top:20px; }

.preview-box{ background:rgba(255,255,255,0.04); border-radius:22px; padding:18px; border:1px solid rgba(255,255,255,0.06); }

.preview-box h3{ margin-bottom:14px; font-size:1.1rem; }

.preview-box img, .preview-box canvas, .preview-box svg{ width:100%; border-radius:18px; background:#000; }

.download-btn{ margin-top:15px; }

.loading{ display:none; text-align:center; padding:15px; font-weight:700; color:#60a5fa; animation:pulse 1s infinite; }

@keyframes pulse{ 0%{opacity:.4} 50%{opacity:1} 100%{opacity:.4} }

.footer{ margin-top:40px; text-align:center; color:#6b7280; font-size:.95rem; }

@media(max-width:700px){ .header h1{ font-size:2.1rem; }

.container{ padding:18px; } } </style>

</head>
<body><div class="container"><div class="header">
<h1>Ultra Image AI</h1>
<p>Melhore imagens em até 4X e transforme em vetor SVG automaticamente.</p>
</div><div class="card"><label class="upload-area" for="imageInput">
<h2>📤 Enviar Imagem</h2>
<p>Clique aqui para selecionar uma imagem</p>
</label>
<input type="file" id="imageInput" accept="image/*"><div class="controls"><div class="control-box">
<label>Qualidade</label>
<select id="scaleSelect">
<option value="2">2X</option>
<option value="4" selected>4X</option>
<option value="8">8X</option>
</select>
</div><div class="control-box">
<label>Vetorizar</label>
<button id="vectorizeBtn">Gerar Vetor SVG</button>
</div><div class="control-box">
<label>Upscale</label>
<button id="upscaleBtn">Melhorar Qualidade</button>
</div></div><div class="loading" id="loadingText">
Processando imagem...
</div><div class="preview-grid"><div class="preview-box">
<h3>Imagem Original</h3>
<img id="originalPreview" />
</div><div class="preview-box">
<h3>Imagem Melhorada</h3>
<canvas id="upscaledCanvas"></canvas>
<button class="download-btn" id="downloadUpscaled">Baixar PNG</button>
</div><div class="preview-box">
<h3>Imagem Vetorizada</h3>
<div id="svgContainer"></div>
<button class="download-btn" id="downloadSVG">Baixar SVG</button>
</div></div></div><div class="footer">
Criado em HTML, CSS e JavaScript puro.
</div></div><script>
const imageInput = document.getElementById('imageInput');
const originalPreview = document.getElementById('originalPreview');
const upscaleBtn = document.getElementById('upscaleBtn');
const vectorizeBtn = document.getElementById('vectorizeBtn');
const canvas = document.getElementById('upscaledCanvas');
const ctx = canvas.getContext('2d');
const scaleSelect = document.getElementById('scaleSelect');
const loadingText = document.getElementById('loadingText');
const svgContainer = document.getElementById('svgContainer');
const downloadUpscaled = document.getElementById('downloadUpscaled');
const downloadSVG = document.getElementById('downloadSVG');

let uploadedImage = null;
let generatedSVG = '';

imageInput.addEventListener('change', e => {
const file = e.target.files[0];
if(!file) return;

const reader = new FileReader();
reader.onload = function(event){
originalPreview.src = event.target.result;

uploadedImage = new Image();
uploadedImage.src = event.target.result;
};
reader.readAsDataURL(file);
});

upscaleBtn.addEventListener('click', () => {
if(!uploadedImage){
alert('Envie uma imagem primeiro.');
return;
}

loadingText.style.display = 'block';

uploadedImage.onload = () => {
const scale = parseInt(scaleSelect.value);

canvas.width = uploadedImage.width * scale;
canvas.height = uploadedImage.height * scale;

ctx.imageSmoothingEnabled = true;
ctx.imageSmoothingQuality = 'high';

ctx.drawImage(
uploadedImage,
0,
0,
canvas.width,
canvas.height
);

applySharpen();
loadingText.style.display = 'none';
};

if(uploadedImage.complete){
uploadedImage.onload();
}
});

function applySharpen(){
const weights = [
0,-1,0,
-1,5,-1,
0,-1,0
];

const side = Math.round(Math.sqrt(weights.length));
const halfSide = Math.floor(side / 2);

const src = ctx.getImageData(0,0,canvas.width,canvas.height);
const sw = src.width;
const sh = src.height;
const output = ctx.createImageData(sw,sh);
const dst = output.data;
const srcData = src.data;

for(let y=0;y<sh;y++){
for(let x=0;x<sw;x++){
let r=0,g=0,b=0,a=0;

for(let cy=0;cy<side;cy++){
for(let cx=0;cx<side;cx++){
const scy = y + cy - halfSide;
const scx = x + cx - halfSide;

if(scy>=0 && scy<sh && scx>=0 && scx<sw){
const srcOffset = (scy * sw + scx) * 4;
const wt = weights[cy * side + cx];

r += srcData[srcOffset] * wt;
g += srcData[srcOffset+1] * wt;
b += srcData[srcOffset+2] * wt;
a += srcData[srcOffset+3] * wt;
}
}
}

const dstOffset = (y * sw + x) * 4;
dst[dstOffset] = r;
dst[dstOffset+1] = g;
dst[dstOffset+2] = b;
dst[dstOffset+3] = a;
}
}

ctx.putImageData(output,0,0);
}

vectorizeBtn.addEventListener('click', () => {
if(!uploadedImage){
alert('Envie uma imagem primeiro.');
return;
}

loadingText.style.display = 'block';

const tempCanvas = document.createElement('canvas');
const tempCtx = tempCanvas.getContext('2d');

tempCanvas.width = uploadedImage.width;
tempCanvas.height = uploadedImage.height;

tempCtx.drawImage(uploadedImage,0,0);

const dataURL = tempCanvas.toDataURL('image/png');

Potrace.loadImageFromUrl(dataURL);

Potrace.process(function(){
generatedSVG = Potrace.getSVG(1);
svgContainer.innerHTML = generatedSVG;
loadingText.style.display = 'none';
});
});

downloadUpscaled.addEventListener('click', () => {
const link = document.createElement('a');
link.download = 'imagem-melhorada.png';
link.href = canvas.toDataURL('image/png');
link.click();
});

downloadSVG.addEventListener('click', () => {
if(!generatedSVG){
alert('Nenhum SVG gerado ainda.');
return;
}

const blob = new Blob([generatedSVG], {type:'image/svg+xml'});
const url = URL.createObjectURL(blob);

const link = document.createElement('a');
link.href = url;
link.download = 'imagem-vetorizada.svg';
link.click();
});
</script></body>
</html>
