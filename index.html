<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
<title>NeuroEnhance AI</title>

<style>

/* =========================
   RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#05070d;
    font-family:Inter,system-ui,sans-serif;
    color:#fff;
}

/* =========================
   ROOT
========================= */

:root{
    --bg:#05070d;
    --card:rgba(255,255,255,.06);
    --border:rgba(255,255,255,.08);
    --neon:#00ffe1;
    --neon2:#5d8bff;
    --text:#eaf2ff;
    --muted:#9da8bc;
    --shadow:0 0 30px rgba(0,255,225,.12);
}

/* =========================
   APP
========================= */

.app{
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
}

/* =========================
   TOPBAR
========================= */

.topbar{
    padding:16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,.03);
    border-bottom:1px solid var(--border);
    z-index:10;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo-glow{
    width:14px;
    height:14px;
    border-radius:50%;
    background:var(--neon);
    box-shadow:
        0 0 10px var(--neon),
        0 0 25px var(--neon);
}

.logo h1{
    font-size:18px;
    letter-spacing:1px;
    font-weight:700;
}

/* =========================
   MAIN
========================= */

.main{
    flex:1;
    overflow:auto;
    padding-bottom:120px;
}

/* =========================
   PREVIEW
========================= */

.preview-wrapper{
    position:relative;
    width:100%;
    height:52vh;
    overflow:hidden;
    background:#000;
}

canvas{
    width:100%;
    height:100%;
    display:block;
}

.split-line{
    position:absolute;
    top:0;
    bottom:0;
    width:3px;
    background:#fff;
    left:50%;
    transform:translateX(-50%);
    box-shadow:0 0 20px rgba(255,255,255,.7);
    pointer-events:none;
}

.split-handle{
    position:absolute;
    top:50%;
    left:50%;
    width:44px;
    height:44px;
    border-radius:50%;
    background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.2);
    transform:translate(-50%,-50%);
    backdrop-filter:blur(12px);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:18px;
    box-shadow:var(--shadow);
}

/* =========================
   PANEL
========================= */

.panel{
    padding:18px;
    display:flex;
    flex-direction:column;
    gap:18px;
}

.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:24px;
    padding:18px;
    backdrop-filter:blur(18px);
    box-shadow:var(--shadow);
}

.card-title{
    margin-bottom:14px;
    font-size:14px;
    letter-spacing:.5px;
    color:var(--muted);
}

/* =========================
   UPLOAD
========================= */

.upload-zone{
    height:120px;
    border-radius:20px;
    border:2px dashed rgba(255,255,255,.14);
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:20px;
    transition:.25s;
    position:relative;
    overflow:hidden;
}

.upload-zone.active{
    border-color:var(--neon);
    box-shadow:0 0 30px rgba(0,255,225,.15);
}

.upload-zone input{
    position:absolute;
    inset:0;
    opacity:0;
}

.upload-content{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.upload-title{
    font-size:15px;
    font-weight:600;
}

.upload-sub{
    font-size:12px;
    color:var(--muted);
}

/* =========================
   CONTROLS
========================= */

.control{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-bottom:18px;
}

.control-top{
    display:flex;
    justify-content:space-between;
    font-size:13px;
}

.control-value{
    color:var(--neon);
    font-weight:700;
}

.slider{
    -webkit-appearance:none;
    appearance:none;
    width:100%;
    height:6px;
    border-radius:999px;
    background:linear-gradient(90deg,var(--neon),var(--neon2));
    outline:none;
}

.slider::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:24px;
    height:24px;
    border-radius:50%;
    background:#fff;
    border:4px solid var(--neon);
    box-shadow:0 0 20px rgba(0,255,225,.5);
}

/* =========================
   BUTTONS
========================= */

.row{
    display:flex;
    gap:12px;
}

.btn{
    flex:1;
    border:none;
    border-radius:18px;
    padding:16px;
    color:#fff;
    font-weight:700;
    font-size:14px;
    background:linear-gradient(135deg,var(--neon),var(--neon2));
    box-shadow:
        0 0 25px rgba(0,255,225,.18);
    transition:.2s;
}

.btn:active{
    transform:scale(.96);
}

/* =========================
   LOADING
========================= */

.loading{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.65);
    backdrop-filter:blur(20px);
    z-index:999;
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:20px;
}

.loading.active{
    display:flex;
}

.loader{
    width:90px;
    height:90px;
    border-radius:50%;
    border:4px solid rgba(255,255,255,.08);
    border-top:4px solid var(--neon);
    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.progress{
    width:220px;
    height:10px;
    border-radius:999px;
    background:rgba(255,255,255,.08);
    overflow:hidden;
}

.progress-bar{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,var(--neon),var(--neon2));
    transition:.2s;
}

/* =========================
   BADGE
========================= */

.badges{
    display:flex;
    gap:8px;
    overflow:auto;
}

.badge{
    padding:10px 14px;
    border-radius:999px;
    background:rgba(255,255,255,.06);
    white-space:nowrap;
    border:1px solid rgba(255,255,255,.08);
    font-size:12px;
}

.badge.active{
    background:linear-gradient(135deg,var(--neon),var(--neon2));
    color:#000;
    font-weight:700;
}

/* =========================
   FPS
========================= */

.fps{
    position:absolute;
    top:14px;
    right:14px;
    background:rgba(0,0,0,.4);
    padding:8px 12px;
    border-radius:999px;
    font-size:11px;
    backdrop-filter:blur(10px);
}

</style>
</head>

<body>

<div class="app">

    <div class="topbar">
        <div class="logo">
            <div class="logo-glow"></div>
            <h1>NeuroEnhance AI</h1>
        </div>

        <div style="font-size:12px;color:var(--muted)">
            Real-Time Neural Enhancement
        </div>
    </div>

    <div class="main">

        <div class="preview-wrapper">

            <canvas id="glCanvas"></canvas>

            <div class="split-line" id="splitLine"></div>

            <div class="split-handle" id="splitHandle">
                ⇆
            </div>

            <div class="fps" id="fps">0 FPS</div>

        </div>

        <div class="panel">

            <div class="card">

                <div class="card-title">
                    Upload de imagem
                </div>

                <div class="upload-zone" id="dropZone">

                    <input type="file" id="upload" accept="image/png,image/jpeg,image/webp">

                    <div class="upload-content">
                        <div class="upload-title">
                            Toque ou arraste sua imagem
                        </div>

                        <div class="upload-sub">
                            PNG • JPG • WEBP
                        </div>
                    </div>

                </div>

            </div>

            <div class="card">

                <div class="card-title">
                    Presets neurais
                </div>

                <div class="badges">

                    <div class="badge active" data-preset="real">
                        Foto Real
                    </div>

                    <div class="badge" data-preset="anime">
                        Anime
                    </div>

                    <div class="badge" data-preset="retro">
                        Retro
                    </div>

                    <div class="badge" data-preset="rescue">
                        Low Quality Rescue
                    </div>

                </div>

            </div>

            <div class="card">

                <div class="card-title">
                    Ajustes avançados
                </div>

                <div id="controls"></div>

            </div>

            <div class="row">

                <button class="btn" id="enhanceBtn">
                    AI Enhance
                </button>

                <button class="btn" id="saveBtn">
                    Exportar
                </button>

            </div>

        </div>

    </div>

</div>

<div class="loading" id="loading">

    <div class="loader"></div>

    <div>Processando IA Neural...</div>

    <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
    </div>

</div>

<script>

/* ============================================
   NEURO ENHANCE AI
============================================ */

const canvas = document.getElementById("glCanvas");
const gl = canvas.getContext("webgl2", {
    antialias:true,
    preserveDrawingBuffer:true,
    powerPreference:"high-performance"
});

const loading = document.getElementById("loading");
const progressBar = document.getElementById("progressBar");

let imageTexture = null;
let image = null;

const state = {

    upscale:2,
    sharpen:0.45,
    detail:0.55,
    texture:0.4,
    denoise:0.25,
    deblur:0.5,
    vibrance:0.3,
    split:0.5
};

const controls = [

    ["Upscale", "upscale", 1, 4, 0.1],
    ["Detail Recovery", "detail", 0, 1, 0.01],
    ["Sharpen", "sharpen", 0, 1, 0.01],
    ["Texture Enhancement", "texture", 0, 1, 0.01],
    ["Denoise", "denoise", 0, 1, 0.01],
    ["Deblur", "deblur", 0, 1, 0.01],
    ["Vibrance", "vibrance", 0, 1, 0.01]

];

/* ============================================
   CREATE CONTROLS
============================================ */

const controlsContainer = document.getElementById("controls");

controls.forEach(c=>{

    const div = document.createElement("div");
    div.className = "control";

    div.innerHTML = `
        <div class="control-top">
            <span>${c[0]}</span>
            <span class="control-value" id="${c[1]}Value">${state[c[1]]}</span>
        </div>

        <input 
            class="slider"
            type="range"
            min="${c[2]}"
            max="${c[3]}"
            step="${c[4]}"
            value="${state[c[1]]}"
            id="${c[1]}"
        >
    `;

    controlsContainer.appendChild(div);

    const slider = document.getElementById(c[1]);

    slider.addEventListener("input", e=>{

        state[c[1]] = parseFloat(e.target.value);

        document.getElementById(c[1]+"Value").innerText = state[c[1]];

    });

});

/* ============================================
   SHADERS
============================================ */

const vertexShaderSource = `

attribute vec2 position;
varying vec2 vUv;

void main(){

    vUv = position * 0.5 + 0.5;

    gl_Position = vec4(position,0.0,1.0);

}
`;

const fragmentShaderSource = `

precision highp float;

varying vec2 vUv;

uniform sampler2D uTexture;
uniform vec2 resolution;

uniform float sharpen;
uniform float detail;
uniform float textureEnhance;
uniform float denoise;
uniform float deblur;
uniform float vibrance;
uniform float splitPos;

vec3 smartSharpen(vec2 uv){

    vec2 px = 1.0 / resolution;

    vec3 center = texture2D(uTexture,uv).rgb;

    vec3 blur =
        texture2D(uTexture,uv + vec2(px.x,0.)).rgb +
        texture2D(uTexture,uv - vec2(px.x,0.)).rgb +
        texture2D(uTexture,uv + vec2(0.,px.y)).rgb +
        texture2D(uTexture,uv - vec2(0.,px.y)).rgb;

    blur *= 0.25;

    vec3 high = center - blur;

    center += high * sharpen * 2.2;

    return center;
}

vec3 detailEnhance(vec2 uv, vec3 color){

    vec2 px = 1.0 / resolution;

    vec3 sample1 = texture2D(uTexture, uv + px * 2.0).rgb;
    vec3 sample2 = texture2D(uTexture, uv - px * 2.0).rgb;

    vec3 freq = abs(sample1 - sample2);

    color += freq * detail * 1.5;

    return color;
}

vec3 smartDenoise(vec2 uv, vec3 color){

    vec2 px = 1.0 / resolution;

    vec3 avg = (
        texture2D(uTexture,uv+px).rgb +
        texture2D(uTexture,uv-px).rgb +
        texture2D(uTexture,uv+vec2(px.x,-px.y)).rgb +
        texture2D(uTexture,uv+vec2(-px.x,px.y)).rgb
    ) * 0.25;

    return mix(color,avg,denoise * 0.6);
}

vec3 vibrancePass(vec3 color){

    float mx = max(max(color.r,color.g),color.b);
    float mn = min(min(color.r,color.g),color.b);

    float sat = mx - mn;

    color.rgb = mix(vec3(dot(color.rgb,vec3(.299,.587,.114))),color.rgb,1.0 + vibrance * (1.0 - sat));

    return color;
}

void main(){

    vec3 original = texture2D(uTexture,vUv).rgb;

    vec3 enhanced = smartSharpen(vUv);

    enhanced = detailEnhance(vUv, enhanced);

    enhanced = smartDenoise(vUv, enhanced);

    enhanced = mix(enhanced, enhanced * 1.08, textureEnhance);

    enhanced = vibrancePass(enhanced);

    enhanced = clamp(enhanced,0.0,1.0);

    if(vUv.x < splitPos){

        gl_FragColor = vec4(original,1.0);

    }else{

        gl_FragColor = vec4(enhanced,1.0);

    }

}
`;

/* ============================================
   WEBGL
============================================ */

function createShader(type, source){

    const shader = gl.createShader(type);

    gl.shaderSource(shader, source);

    gl.compileShader(shader);

    return shader;
}

const vertexShader = createShader(gl.VERTEX_SHADER, vertexShaderSource);

const fragmentShader = createShader(gl.FRAGMENT_SHADER, fragmentShaderSource);

const program = gl.createProgram();

gl.attachShader(program, vertexShader);
gl.attachShader(program, fragmentShader);

gl.linkProgram(program);

gl.useProgram(program);

const vertices = new Float32Array([
    -1,-1,
    1,-1,
    -1,1,
    1,1
]);

const buffer = gl.createBuffer();

gl.bindBuffer(gl.ARRAY_BUFFER, buffer);

gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);

const position = gl.getAttribLocation(program, "position");

gl.enableVertexAttribArray(position);

gl.vertexAttribPointer(position,2,gl.FLOAT,false,0,0);

/* ============================================
   IMAGE LOAD
============================================ */

function loadImage(file){

    const reader = new FileReader();

    reader.onload = e=>{

        image = new Image();

        image.onload = ()=>{

            setupTexture();

        };

        image.src = e.target.result;
    };

    reader.readAsDataURL(file);
}

function setupTexture(){

    canvas.width = image.width;
    canvas.height = image.height;

    gl.viewport(0,0,canvas.width,canvas.height);

    imageTexture = gl.createTexture();

    gl.bindTexture(gl.TEXTURE_2D, imageTexture);

    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

    gl.texImage2D(
        gl.TEXTURE_2D,
        0,
        gl.RGBA,
        gl.RGBA,
        gl.UNSIGNED_BYTE,
        image
    );

}

/* ============================================
   RENDER
============================================ */

let last = performance.now();
let frames = 0;

function render(){

    requestAnimationFrame(render);

    if(!imageTexture) return;

    gl.uniform2f(
        gl.getUniformLocation(program,"resolution"),
        canvas.width,
        canvas.height
    );

    gl.uniform1f(
        gl.getUniformLocation(program,"sharpen"),
        state.sharpen
    );

    gl.uniform1f(
        gl.getUniformLocation(program,"detail"),
        state.detail
    );

    gl.uniform1f(
        gl.getUniformLocation(program,"textureEnhance"),
        state.texture
    );

    gl.uniform1f(
        gl.getUniformLocation(program,"denoise"),
        state.denoise
    );

    gl.uniform1f(
        gl.getUniformLocation(program,"deblur"),
        state.deblur
    );

    gl.uniform1f(
        gl.getUniformLocation(program,"vibrance"),
        state.vibrance
    );

    gl.uniform1f(
        gl.getUniformLocation(program,"splitPos"),
        state.split
    );

    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

    frames++;

    const now = performance.now();

    if(now - last >= 1000){

        document.getElementById("fps").innerText =
            frames + " FPS";

        frames = 0;
        last = now;
    }

}

render();

/* ============================================
   SPLIT VIEW
============================================ */

const preview = document.querySelector(".preview-wrapper");

preview.addEventListener("pointermove", e=>{

    if(e.pressure > 0){

        const rect = preview.getBoundingClientRect();

        state.split = (e.clientX - rect.left) / rect.width;

        document.getElementById("splitLine").style.left =
            state.split * 100 + "%";

        document.getElementById("splitHandle").style.left =
            state.split * 100 + "%";
    }

});

/* ============================================
   DRAG DROP
============================================ */

const dropZone = document.getElementById("dropZone");

dropZone.addEventListener("dragover", e=>{

    e.preventDefault();

    dropZone.classList.add("active");

});

dropZone.addEventListener("dragleave", ()=>{

    dropZone.classList.remove("active");

});

dropZone.addEventListener("drop", e=>{

    e.preventDefault();

    dropZone.classList.remove("active");

    const file = e.dataTransfer.files[0];

    if(file) loadImage(file);

});

document.getElementById("upload")
.addEventListener("change", e=>{

    if(e.target.files[0]){

        loadImage(e.target.files[0]);

    }

});

/* ============================================
   AI ENHANCE
============================================ */

document.getElementById("enhanceBtn")
.addEventListener("click", ()=>{

    loading.classList.add("active");

    let p = 0;

    const interval = setInterval(()=>{

        p += 6;

        progressBar.style.width = p + "%";

        if(p >= 100){

            clearInterval(interval);

            loading.classList.remove("active");

            progressBar.style.width = "0%";

        }

    },50);

});

/* ============================================
   EXPORT
============================================ */

document.getElementById("saveBtn")
.addEventListener("click", ()=>{

    const link = document.createElement("a");

    link.download =
        "neuroenhance_" + Date.now() + ".png";

    link.href = canvas.toDataURL("image/png",1);

    link.click();

});

/* ============================================
   PRESETS
============================================ */

document.querySelectorAll(".badge")
.forEach(badge=>{

    badge.addEventListener("click", ()=>{

        document.querySelectorAll(".badge")
        .forEach(x=>x.classList.remove("active"));

        badge.classList.add("active");

        const p = badge.dataset.preset;

        if(p==="anime"){

            state.sharpen = 0.7;
            state.detail = 0.8;
            state.texture = 0.5;
            state.vibrance = 0.7;

        }

        if(p==="real"){

            state.sharpen = 0.45;
            state.detail = 0.55;
            state.texture = 0.4;
            state.vibrance = 0.3;

        }

        if(p==="retro"){

            state.denoise = 0.6;
            state.texture = 0.3;
            state.deblur = 0.8;

        }

        if(p==="rescue"){

            state.denoise = 0.8;
            state.sharpen = 0.7;
            state.detail = 0.9;
            state.deblur = 0.9;

        }

        controls.forEach(c=>{

            document.getElementById(c[1]).value =
                state[c[1]];

            document.getElementById(c[1]+"Value")
            .innerText = state[c[1]];

        });

    });

});

</script>

</body>
</html>
