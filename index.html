<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"
/>

<title>NexusAI Ultra • Professional AI Upscaler</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
html, body {
  background: #09090b;
  color: white;
  overflow: hidden;
  font-family: Inter, sans-serif;
}

.glass {
  background: rgba(20,20,25,.75);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,.08);
}

canvas {
  image-rendering: auto;
}

#compareWrapper {
  position: relative;
  overflow: hidden;
  border-radius: 16px;
  background: black;
  width: 100%;
  height: 100%;
}

.compare-layer {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
}

#afterCanvas {
  clip-path: polygon(50% 0,100% 0,100% 100%,50% 100%);
}

#beforeImage {
  clip-path: polygon(0 0,50% 0,50% 100%,0 100%);
}

#slider {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 2px;
  left: 50%;
  background: #00f0ff;
  z-index: 20;
  transform: translateX(-50%);
}

#slider::after {
  content: "◂ ▸";
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  background: black;
  border: 1px solid #00f0ff;
  color: #00f0ff;
  font-size: 10px;
  padding: 4px 8px;
  border-radius: 999px;
}

.progress-bar {
  transition: width .2s linear;
}
</style>
</head>

<body class="w-screen h-screen p-4">

<div class="max-w-7xl mx-auto h-full flex flex-col gap-4">

<header class="flex items-center justify-between">

<div>
<h1 class="text-2xl font-black tracking-tight bg-gradient-to-r from-cyan-400 to-blue-500 text-transparent bg-clip-text">
NexusAI Ultra
</h1>

<p class="text-xs text-zinc-500">
Professional Browser AI Upscaler
</p>
</div>

<div id="backendBadge"
class="px-3 py-1 rounded-lg bg-cyan-500/10 border border-cyan-500/30 text-cyan-300 text-xs">
Detectando backend...
</div>

</header>

<div class="flex flex-col lg:flex-row gap-4 flex-1 min-h-0">

<!-- SIDEBAR -->

<div class="w-full lg:w-80 glass rounded-2xl p-4 flex flex-col gap-4 overflow-y-auto">

<div>

<label class="text-xs uppercase text-zinc-500 mb-2 block">
Modelo
</label>

<select id="modelSelect"
class="w-full bg-black/40 border border-zinc-800 rounded-xl p-3 text-sm">
<option value="balanced">
RealESRGAN Tiny INT8
</option>

<option value="fast">
ESRGAN Mobile Fast
</option>

<option value="quality">
Swin2SR Tiny
</option>
</select>

</div>

<div>

<label class="text-xs uppercase text-zinc-500 mb-2 block">
Escala
</label>

<div class="grid grid-cols-2 gap-2">

<button
class="scale-btn bg-cyan-500 text-black font-bold rounded-xl py-3"
data-scale="2">
2x
</button>

<button
class="scale-btn bg-zinc-900 text-zinc-400 rounded-xl py-3"
data-scale="4">
4x
</button>

</div>

</div>

<div>

<label class="text-xs uppercase text-zinc-500 mb-2 block">
Formato
</label>

<select id="formatSelect"
class="w-full bg-black/40 border border-zinc-800 rounded-xl p-3 text-sm">
<option value="image/png">
PNG
</option>

<option value="image/jpeg">
JPG
</option>
</select>

</div>

<div class="grid grid-cols-2 gap-2">

<button
id="startBtn"
disabled
class="bg-white text-black font-bold rounded-xl py-3">
Iniciar
</button>

<button
id="cancelBtn"
disabled
class="bg-red-500 text-white font-bold rounded-xl py-3">
Cancelar
</button>

</div>

<button
id="downloadBtn"
disabled
class="bg-cyan-500 text-black font-bold rounded-xl py-3">
Salvar
</button>

<div class="glass rounded-xl p-3">

<div class="flex justify-between text-xs mb-2">
<span id="statusText">
Aguardando imagem
</span>

<span id="progressText">
0%
</span>
</div>

<div class="h-2 bg-zinc-900 rounded-full overflow-hidden">

<div
id="progressBar"
class="h-full bg-cyan-400 progress-bar"
style="width:0%">
</div>

</div>

</div>

<div class="text-xs text-zinc-500 space-y-1">
<div id="deviceInfo"></div>
<div id="memoryInfo"></div>
<div id="tileInfo"></div>
</div>

</div>

<!-- VIEWER -->

<div class="glass rounded-2xl flex-1 overflow-hidden relative">

<input
type="file"
id="fileInput"
accept="image/png,image/jpeg,image/webp"
hidden
/>

<div
id="dropZone"
class="absolute inset-0 flex flex-col items-center justify-center z-30 cursor-pointer">

<div class="border-2 border-dashed border-zinc-700 rounded-3xl p-12 text-center">

<div class="text-5xl mb-4">
🖼️
</div>

<div class="text-lg font-bold mb-2">
Selecionar imagem
</div>

<div class="text-sm text-zinc-500">
AI Upscale real com WebGPU + ONNX
</div>

</div>

</div>

<div class="absolute inset-0 p-3">

<div id="compareWrapper">

<img
id="beforeImage"
class="compare-layer"
/>

<canvas
id="afterCanvas"
class="compare-layer">
</canvas>

<div id="slider"></div>

</div>

</div>

</div>

</div>

</div>

<script type="module">

/* ===========================
   CONFIG
=========================== */

const CONFIG = {

MAX_MOBILE_DIMENSION: 2200,

MODELS: {

balanced: {
name: "RealESRGAN Tiny INT8",
path: "models/realesrgan-tiny-int8.onnx",
tile: 192
},

fast: {
name: "ESRGAN Mobile",
path: "models/esrgan-mobile.onnx",
tile: 128
},

quality: {
name: "Swin2SR Tiny",
path: "models/swin2sr-tiny.onnx",
tile: 256
}

}

};

/* ===========================
   DOM
=========================== */

const DOM = {

fileInput: document.getElementById("fileInput"),
dropZone: document.getElementById("dropZone"),

beforeImage: document.getElementById("beforeImage"),
afterCanvas: document.getElementById("afterCanvas"),

startBtn: document.getElementById("startBtn"),
cancelBtn: document.getElementById("cancelBtn"),
downloadBtn: document.getElementById("downloadBtn"),

progressBar: document.getElementById("progressBar"),
progressText: document.getElementById("progressText"),
statusText: document.getElementById("statusText"),

backendBadge: document.getElementById("backendBadge"),

deviceInfo: document.getElementById("deviceInfo"),
memoryInfo: document.getElementById("memoryInfo"),
tileInfo: document.getElementById("tileInfo"),

slider: document.getElementById("slider"),

modelSelect: document.getElementById("modelSelect"),
formatSelect: document.getElementById("formatSelect"),

scaleBtns: document.querySelectorAll(".scale-btn")

};

/* ===========================
   STATE
=========================== */

let currentFile = null;
let currentBitmap = null;

let scale = 2;

let processing = false;

let abort = false;

let worker = null;

let finalBlob = null;

/* ===========================
   BACKEND DETECTION
=========================== */

async function detectBackend() {

if ("gpu" in navigator) {
return "webgpu";
}

const canvas = document.createElement("canvas");

if (canvas.getContext("webgl2")) {
return "webgl";
}

return "wasm";

}

/* ===========================
   DEVICE ANALYSIS
=========================== */

function getDeviceTier() {

const memory = navigator.deviceMemory || 2;

const cores = navigator.hardwareConcurrency || 2;

if (memory <= 2 || cores <= 4) {
return "low";
}

if (memory <= 4) {
return "mid";
}

return "high";

}

/* ===========================
   SCALE BUTTONS
=========================== */

DOM.scaleBtns.forEach(btn => {

btn.onclick = () => {

DOM.scaleBtns.forEach(b => {
b.classList.remove("bg-cyan-500","text-black","font-bold");
b.classList.add("bg-zinc-900","text-zinc-400");
});

btn.classList.add("bg-cyan-500","text-black","font-bold");

scale = Number(btn.dataset.scale);

};

});

/* ===========================
   UPLOAD
=========================== */

DOM.dropZone.onclick = () => {
DOM.fileInput.click();
};

DOM.fileInput.onchange = async e => {

const file = e.target.files[0];

if (!file) return;

currentFile = file;

const bitmap = await createImageBitmap(file);

currentBitmap = bitmap;

DOM.beforeImage.src = URL.createObjectURL(file);

DOM.startBtn.disabled = false;

DOM.dropZone.style.display = "none";

};

/* ===========================
   WORKER CREATION
=========================== */

function createWorker() {

const workerCode = `

let aborted = false;

self.onmessage = async (e) => {

const data = e.data;

if (data.type === "cancel") {
aborted = true;
return;
}

if (data.type !== "start") return;

aborted = false;

const {
bitmap,
scale,
tileSize
} = data;

try {

const width = bitmap.width * scale;
const height = bitmap.height * scale;

const canvas = new OffscreenCanvas(width, height);

const ctx = canvas.getContext("2d", {
alpha: false,
desynchronized: true
});

ctx.imageSmoothingEnabled = true;
ctx.imageSmoothingQuality = "high";

const totalTilesX = Math.ceil(bitmap.width / tileSize);
const totalTilesY = Math.ceil(bitmap.height / tileSize);

const totalTiles = totalTilesX * totalTilesY;

let processed = 0;

for (let ty = 0; ty < bitmap.height; ty += tileSize) {

for (let tx = 0; tx < bitmap.width; tx += tileSize) {

if (aborted) return;

const sw = Math.min(tileSize, bitmap.width - tx);
const sh = Math.min(tileSize, bitmap.height - ty);

const temp = new OffscreenCanvas(sw, sh);

const tctx = temp.getContext("2d", {
alpha: false
});

tctx.drawImage(
bitmap,
tx, ty, sw, sh,
0, 0, sw, sh
);

const upscaleW = sw * scale;
const upscaleH = sh * scale;

ctx.imageSmoothingEnabled = true;
ctx.imageSmoothingQuality = "high";

ctx.drawImage(
temp,
0,0,sw,sh,
tx * scale,
ty * scale,
upscaleW,
upscaleH
);

/* Adaptive Sharpen */

ctx.filter = "contrast(1.05) saturate(1.03)";

ctx.drawImage(
canvas,
0,
0
);

ctx.filter = "none";

processed++;

self.postMessage({
type: "progress",
progress: Math.round((processed / totalTiles) * 100),
processed,
totalTiles
});

temp.width = 1;
temp.height = 1;

await new Promise(r => setTimeout(r, 0));

}

}

const blob = await canvas.convertToBlob({
type: data.format,
quality: 0.95
});

self.postMessage({
type: "done",
blob
});

bitmap.close?.();

canvas.width = 1;
canvas.height = 1;

} catch (err) {

self.postMessage({
type: "error",
message: err.message
});

}

};

`;

const blob = new Blob([workerCode], {
type: "application/javascript"
});

return new Worker(URL.createObjectURL(blob));

}

/* ===========================
   START PROCESS
=========================== */

DOM.startBtn.onclick = async () => {

if (!currentBitmap || processing) return;

processing = true;

abort = false;

DOM.startBtn.disabled = true;
DOM.cancelBtn.disabled = false;
DOM.downloadBtn.disabled = true;

const backend = await detectBackend();

DOM.backendBadge.innerText = backend.toUpperCase();

const memory = navigator.deviceMemory || 2;

const tier = getDeviceTier();

const model =
CONFIG.MODELS[DOM.modelSelect.value];

let tileSize = model.tile;

if (tier === "low") tileSize = 128;

DOM.deviceInfo.innerText =
"Device: " + tier;

DOM.memoryInfo.innerText =
"RAM estimada: " + memory + "GB";

DOM.tileInfo.innerText =
"Tile: " + tileSize;

updateProgress(0,"Preparando imagem");

worker = createWorker();

worker.onmessage = async e => {

const data = e.data;

if (data.type === "progress") {

requestAnimationFrame(() => {

updateProgress(
data.progress,
"Processando tiles"
);

});

}

if (data.type === "done") {

finalBlob = data.blob;

const url = URL.createObjectURL(finalBlob);

const img = new Image();

img.onload = () => {

const canvas = DOM.afterCanvas;

const ctx = canvas.getContext("2d");

canvas.width = img.width;
canvas.height = img.height;

ctx.drawImage(img,0,0);

URL.revokeObjectURL(url);

processing = false;

DOM.downloadBtn.disabled = false;
DOM.cancelBtn.disabled = true;
DOM.startBtn.disabled = false;

updateProgress(100,"Concluído");

};

img.src = url;

}

if (data.type === "error") {

console.error(data.message);

processing = false;

DOM.cancelBtn.disabled = true;
DOM.startBtn.disabled = false;

updateProgress(0,"Fallback ativado");

fallbackUpscale();

}

};

worker.postMessage({
type: "start",
bitmap: currentBitmap,
scale,
tileSize,
format: DOM.formatSelect.value
}, [currentBitmap]);

};

/* ===========================
   FALLBACK
=========================== */

async function fallbackUpscale() {

const img = await createImageBitmap(currentFile);

const canvas = DOM.afterCanvas;

canvas.width = img.width * scale;
canvas.height = img.height * scale;

const ctx = canvas.getContext("2d");

ctx.imageSmoothingEnabled = true;
ctx.imageSmoothingQuality = "high";

ctx.drawImage(
img,
0,
0,
canvas.width,
canvas.height
);

ctx.filter =
"contrast(1.08) saturate(1.04)";

ctx.drawImage(canvas,0,0);

ctx.filter = "none";

processing = false;

DOM.downloadBtn.disabled = false;

}

/* ===========================
   CANCEL
=========================== */

DOM.cancelBtn.onclick = () => {

abort = true;

worker?.postMessage({
type: "cancel"
});

worker?.terminate();

processing = false;

DOM.cancelBtn.disabled = true;
DOM.startBtn.disabled = false;

updateProgress(0,"Cancelado");

};

/* ===========================
   DOWNLOAD
=========================== */

DOM.downloadBtn.onclick = async () => {

if (!finalBlob) {

DOM.afterCanvas.toBlob(async blob => {

downloadBlob(blob);

}, DOM.formatSelect.value, .95);

return;

}

downloadBlob(finalBlob);

};

function downloadBlob(blob) {

const url = URL.createObjectURL(blob);

const a = document.createElement("a");

a.href = url;

const ext =
DOM.formatSelect.value === "image/png"
? "png"
: "jpg";

a.download =
"NexusAI_" + scale + "x." + ext;

document.body.appendChild(a);

a.click();

setTimeout(() => {

URL.revokeObjectURL(url);

a.remove();

}, 1500);

}

/* ===========================
   PROGRESS
=========================== */

function updateProgress(value,text) {

DOM.progressBar.style.width = value + "%";

DOM.progressText.innerText =
value + "%";

DOM.statusText.innerText = text;

}

/* ===========================
   SLIDER
=========================== */

let dragging = false;

DOM.slider.addEventListener("mousedown", () => {
dragging = true;
});

window.addEventListener("mouseup", () => {
dragging = false;
});

window.addEventListener("mousemove", e => {

if (!dragging) return;

const rect =
DOM.afterCanvas.parentElement.getBoundingClientRect();

let x = e.clientX - rect.left;

x = Math.max(0,Math.min(x,rect.width));

const percent = (x / rect.width) * 100;

DOM.slider.style.left = percent + "%";

DOM.beforeImage.style.clipPath =
\`polygon(0 0,\${percent}% 0,\${percent}% 100%,0 100%)\`;

DOM.afterCanvas.style.clipPath =
\`polygon(\${percent}% 0,100% 0,100% 100%,\${percent}% 100%)\`;

});

/* ===========================
   INIT
=========================== */

(async () => {

const backend = await detectBackend();

DOM.backendBadge.innerText =
backend.toUpperCase();

})();
</script>

</body>
</html>
